name: Deploy to Plesk

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build production bundle
        run: npm run build
        env:
          CI: false

      # SFTP i.p.v. FTPS: één SSH-verbinding, geen los passief datakanaal (dat de
      # Plesk-server voor deze vhost afknijpt → ECONNRESET). Hergebruikt dezelfde
      # secrets. Vereist dat SSH/chrooted-shell aan staat voor dit account.
      - name: Deploy build/ via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: './build/*'
          remote_path: ${{ secrets.FTP_SERVER_DIR }}
          sftp_only: true
